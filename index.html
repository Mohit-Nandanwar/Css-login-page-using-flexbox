<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Css login page</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="Readme.md">
</head>
<body>
  <div class="container">
    <!-- Left side image -->
    <div class="left-side">
      <img src="https://th.bing.com/th/id/OIP.-FN8m3BlbxGjMJh0ODhvxwHaHa?w=181&h=182&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3" alt="Login Illustration">
    </div>

    <!-- Right side login form -->
    <div class="right-side">
      <div class="login-box">
        <h1>Hello Again!</h1>
       <p>Welcome back! we missed you!</p>
        <form>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>

       
          <a href="#" class="forgot-password">Forgot Password?</a>
           <button type="submit">Login</button>
           <p class="Not-a-member">Not a member?</p>
           <a href="#" class="Register-Now">Register Now</a>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
